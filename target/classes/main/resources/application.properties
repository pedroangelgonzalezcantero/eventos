# =========================================
# SALON DE CELEBRACIONES - Configuracion
# =========================================

server.port=8080

# ---- Base de Datos PostgreSQL (Docker) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/eventosdb
spring.datasource.username=postgres
spring.datasource.password=eventos2024
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ---- Flyway - migraciones automaticas ----
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ---- H2 Console (desactivada) ----
spring.h2.console.enabled=false

app.jwt.secret=salon-celebraciones-jwt-secret-key-2024-very-secure-and-long
app.jwt.expiration=604800000

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@tucorreo.com
spring.mail.password=tupassword
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

twilio.account.sid=
twilio.auth.token=
twilio.from.phone=+14155552671
twilio.from.whatsapp=whatsapp:+14155238886

app.base-url=http://localhost:5173
app.admin-password=admin123

app.cors.allowed-origins=http://localhost:5173,http://localhost:5174

logging.level.com.salon.eventos=INFO
logging.level.org.springframework.security=WARN
