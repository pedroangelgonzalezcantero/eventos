databases:
  - name: eventosdb
    plan: free
    databaseName: eventosdb
    user: eventosuser

services:
  - type: web
    name: eventos-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: eventosdb
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        value: admin123
      - key: CORS_ORIGINS
        value: https://tu-frontend.vercel.app
