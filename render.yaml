# Render Blueprint - Deploy automatico del backend
# Documentacion: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: eventos-backend
    runtime: java
    buildCommand: mvn clean package -DskipTests
    startCommand: java -jar target/eventos-1.0.0.jar
    healthCheckPath: /api/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Las siguientes variables deben configurarse manualmente
      # en Render Dashboard > Environment:
      - key: DB_URL
        sync: false   # Render pedira el valor manualmente
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true   # Render genera un valor aleatorio seguro
      - key: ADMIN_PASSWORD
        sync: false
      - key: APP_BASE_URL
        sync: false   # ej: https://tu-app.vercel.app
      - key: CORS_ORIGINS
        sync: false   # ej: https://tu-app.vercel.app
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

