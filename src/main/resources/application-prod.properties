# =========================================
# PRODUCCION - PostgreSQL en Render
# Las variables de entorno se configuran en el dashboard de Render
# =========================================

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/eventosdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:eventos2024}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:salon-celebraciones-jwt-secret-key-2024-very-secure-and-long}
app.jwt.expiration=604800000

app.base-url=${APP_BASE_URL:https://tu-frontend.vercel.app}
app.cors.allowed-origins=${CORS_ORIGINS:https://tu-frontend.vercel.app}
app.admin-password=${ADMIN_PASSWORD:admin123}

logging.level.com.salon.eventos=INFO

# Subida de planos
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB

# Puerto (Render asigna PORT autom·ticamente)
server.port=${PORT:8080}
