# =========================================
# PRODUCCION - PostgreSQL + Flyway
# Variables de entorno configuradas en Render
# =========================================

# Base de datos (variables de entorno de Render)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# JWT y App
app.jwt.secret=${JWT_SECRET:salon-celebraciones-jwt-secret-key-2024-very-secure-and-long}
app.jwt.expiration=604800000
app.admin-password=${ADMIN_PASSWORD:admin123}
app.base-url=${APP_BASE_URL:https://tu-dominio.onrender.com}

# CORS - permitir el frontend de Render
app.cors.allowed-origins=${CORS_ORIGINS:https://tu-frontend.onrender.com}

# Mail (opcional)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:noreply@tucorreo.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

logging.level.com.salon.eventos=INFO
logging.level.org.springframework.security=WARN
