# =========================================
# PRODUCCION - PostgreSQL en Render
# Variables de entorno requeridas en Render:
#   DATABASE_URL  ? Internal Database URL del servicio PostgreSQL de Render
#   JWT_SECRET    ? Clave secreta para JWT
#   CORS_ORIGINS  ? URL del frontend (ej: https://tu-app.vercel.app)
#   ADMIN_PASSWORD ? Contrase±a del admin
# =========================================

# El entrypoint convierte DATABASE_URL (postgres://) a SPRING_DATASOURCE_URL (jdbc:postgresql://)
# Spring Boot tambiķn lee SPRING_DATASOURCE_URL via relaxed binding automaticamente
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eventosdb}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.repair-on-migrate=true
spring.flyway.locations=classpath:db/migration

app.jwt.secret=${JWT_SECRET:salon-celebraciones-jwt-secret-key-2024-very-secure-and-long}
app.jwt.expiration=604800000

app.base-url=${APP_BASE_URL:https://tu-frontend.vercel.app}
app.cors.allowed-origins=${CORS_ORIGINS:https://tu-frontend.vercel.app}
app.admin-password=${ADMIN_PASSWORD:admin123}

logging.level.com.salon.eventos=INFO

spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=21MB

server.port=${PORT:8080}
