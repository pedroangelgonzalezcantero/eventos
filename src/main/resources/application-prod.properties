# =========================================
# PRODUCCION - PostgreSQL + Flyway
# Activar con: -Dspring.profiles.active=prod
# =========================================

spring.datasource.url=jdbc:postgresql://localhost:5432/eventosdb
spring.datasource.username=postgres
spring.datasource.password=eventos2024
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

logging.level.com.salon.eventos=INFO


