# =========================================
# PRODUCCION - PostgreSQL + Flyway
# Activar con: SPRING_PROFILES_ACTIVE=prod
# Variables requeridas en Render:
#   DB_URL, DB_USER, DB_PASSWORD,
#   JWT_SECRET, ADMIN_PASSWORD, CORS_ORIGINS, APP_BASE_URL
#   MAIL_USERNAME, MAIL_PASSWORD (opcional)
# =========================================

# ---- Puerto dinamico (Render inyecta PORT) ----
server.port=${PORT:8080}

# ---- Base de Datos PostgreSQL (Render) ----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# ---- Pool de conexiones ----
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=20000

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# ---- JWT ----
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration=604800000

# ---- Admin ----
app.admin-password=${ADMIN_PASSWORD}

# ---- URL base de la app (frontend) ----
app.base-url=${APP_BASE_URL}

# ---- CORS: dominio de Vercel ----
app.cors.allowed-origins=${CORS_ORIGINS}

# ---- Email (opcional, deja vacios si no se usa) ----
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false

# ---- Twilio (opcional) ----
twilio.account.sid=${TWILIO_ACCOUNT_SID:}
twilio.auth.token=${TWILIO_AUTH_TOKEN:}
twilio.from.phone=${TWILIO_FROM_PHONE:}
twilio.from.whatsapp=${TWILIO_FROM_WHATSAPP:}

# ---- Logging ----
logging.level.com.salon.eventos=INFO
logging.level.org.springframework.security=WARN
